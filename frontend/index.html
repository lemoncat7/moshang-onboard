<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoShang</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
            background: #000;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        
        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 12px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        /* 顶部头像 */
        .profile {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff9500, #ff3b30);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .profile-info {
            flex: 1;
        }
        
        .name {
            font-size: 24px;
            font-weight: 600;
        }
        
        .status {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
        }
        
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        
        .status-dot.online { background: #34c759; }
        .status-dot.idle { background: #ff9f0a; }
        
        /* 网格布局 */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .grid-item {
            background: rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }
        
        .grid-label {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .grid-value {
            font-size: 22px;
            font-weight: 600;
            margin-top: 4px;
        }
        
        .grid-value.orange { color: #ff9500; }
        .grid-value.green { color: #34c759; }
        .grid-value.red { color: #ff3b30; }
        .grid-value.blue { color: #007aff; }
        
        /* 任务卡片 */
        .task-card {
            background: linear-gradient(135deg, rgba(255,149,0,0.15), rgba(255,59,48,0.15));
        }
        
        .task-title {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }
        
        .task-content {
            font-size: 15px;
            font-weight: 500;
        }
        
        .task-content.idle {
            color: #34c759;
        }
        
        .task-content.working {
            color: #ff9f0a;
        }
        
        /* EvoMap 状态 */
        .evomap-card {
            background: linear-gradient(135deg, rgba(0,122,255,0.15), rgba(88,86,214,0.15));
        }
        
        .evo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 12px;
        }
        
        .evo-item {
            text-align: center;
        }
        
        .evo-value {
            font-size: 18px;
            font-weight: 600;
        }
        
        .evo-label {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <!-- 头像卡片 -->
    <div class="card profile">
        <div class="avatar">⚡</div>
        <div class="profile-info">
            <div class="name">MoShang</div>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Idle</span>
            </div>
        </div>
    </div>
    
    <!-- 状态网格 -->
    <div class="grid">
        <div class="grid-item">
            <div class="grid-label">Heartbeat</div>
            <div class="grid-value orange" id="hb">--:--</div>
        </div>
        <div class="grid-item">
            <div class="grid-label">Messages</div>
            <div class="grid-value blue" id="msgs">0</div>
        </div>
        <div class="grid-item">
            <div class="grid-label">Tasks</div>
            <div class="grid-value green" id="tasks">0</div>
        </div>
        <div class="grid-item">
            <div class="grid-label">Uptime</div>
            <div class="grid-value" id="uptime">0h</div>
        </div>
    </div>
    
    <!-- 当前任务 -->
    <div class="card task-card">
        <div class="task-title">Current Task</div>
        <div class="task-content idle" id="task">Idle</div>
    </div>
    
    <!-- EvoMap -->
    <div class="card evomap-card">
        <div class="task-title">EvoMap Status</div>
        <div class="evo-grid">
            <div class="evo-item">
                <div class="evo-value orange" id="evoRep">--</div>
                <div class="evo-label">Reputation</div>
            </div>
            <div class="evo-item">
                <div class="evo-value" id="evoPub">--</div>
                <div class="evo-label">Published</div>
            </div>
            <div class="evo-item">
                <div class="evo-value green" id="evoPro">--</div>
                <div class="evo-label">Promoted</div>
            </div>
            <div class="evo-item">
                <div class="evo-value" id="evoOnline">--</div>
                <div class="evo-label">Online</div>
            </div>
        </div>
    </div>

    <script>
        function update() {
            fetch('/api/dashboard').then(r=>r.json()).then(d=>{
                // 基础状态
                document.getElementById('hb').textContent = d.heartbeat || '--:--';
                document.getElementById('msgs').textContent = d.msgCount || '0';
                document.getElementById('tasks').textContent = d.taskDone || '0';
                document.getElementById('uptime').textContent = d.uptime || '0h';
                
                // 当前任务
                const task = d.currentTask || '';
                const taskEl = document.getElementById('task');
                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                
                if (task) {
                    taskEl.textContent = task;
                    taskEl.className = 'task-content working';
                    statusDot.className = 'status-dot online';
                    statusText.textContent = 'Working';
                } else {
                    taskEl.textContent = 'Idle';
                    taskEl.className = 'task-content idle';
                    statusDot.className = 'status-dot idle';
                    statusText.textContent = 'Idle';
                }
                
                // EvoMap 状态
                if (d.evomap) {
                    const e = d.evomap;
                    document.getElementById('evoRep').textContent = e.reputation || '--';
                    document.getElementById('evoPub').textContent = e.published || '0';
                    document.getElementById('evoPro').textContent = e.promoted || '0';
                    document.getElementById('evoOnline').textContent = e.online ? '🟢' : '⚪';
                }
            }).catch(()=>{});
            setTimeout(update, 5000);
        }
        update();
    </script>
</body>
</html>
