<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoShang Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #ffc864;
            --primary-glow: rgba(255,200,100,0.4);
            --accent: #00d4ff;
            --accent-glow: rgba(0,212,255,0.3);
            --success: #5cdb95;
            --success-glow: rgba(92,219,149,0.3);
            --warning: #feca57;
            --warning-glow: rgba(254,202,87,0.3);
            --danger: #ff6b6b;
            --danger-glow: rgba(255,107,107,0.3);
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20,20,30,0.8);
            --glass: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.08);
            --text: #e0e0e0;
            --text-dim: #666;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }
        
        /* Animated mesh gradient background */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 15% 15%, rgba(255,200,100,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 25%, rgba(0,212,255,0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 75% 75%, rgba(92,219,149,0.06) 0%, transparent 45%),
                radial-gradient(ellipse at 25% 85%, rgba(167,139,250,0.06) 0%, transparent 40%),
                linear-gradient(180deg, #0a0a0f 0%, #12121a 100%);
            animation: meshMove 20s ease-in-out infinite;
            z-index: 0;
        }
        
        @keyframes meshMove {
            0%, 100% { 
                background-position: 0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%;
                filter: hue-rotate(0deg);
            }
            25% { 
                background-position: 20% 10%, 80% 5%, 90% 80%, 10% 90%, 0% 10%;
            }
            50% { 
                background-position: 40% 20%, 60% 40%, 70% 70%, 30% 60%, 0% 20%;
                filter: hue-rotate(10deg);
            }
            75% { 
                background-position: 20% 30%, 90% 60%, 50% 50%, 70% 80%, 0% 30%;
            }
        }
        
        /* Floating particles with trail effect */
        .particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            animation: particleFloat 18s infinite linear;
        }
        
        .particle::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: 50%;
            transform: translateX(-50px);
            opacity: 0.3;
            filter: blur(2px);
        }
        
        @keyframes particleFloat {
            0% { 
                transform: translateY(100vh) rotate(0deg) scale(1);
                opacity: 0;
            }
            5% { opacity: 0.8; }
            95% { opacity: 0.6; }
            100% { 
                transform: translateY(-100vh) rotate(720deg) scale(0.5);
                opacity: 0;
            }
        }
        
        /* Main card with advanced glassmorphism */
        .main-card {
            width: 360px;
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 28px;
            position: relative;
            z-index: 10;
            box-shadow: 
                0 30px 60px -15px rgba(0,0,0,0.6),
                0 0 80px rgba(255,200,100,0.03),
                0 0 1px rgba(255,255,255,0.1),
                inset 0 1px 0 rgba(255,255,255,0.08);
            transform: perspective(1000px) rotateX(0deg);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        
        .main-card:hover {
            transform: perspective(1000px) rotateX(1deg) translateY(-8px);
            box-shadow: 
                0 40px 80px -20px rgba(0,0,0,0.7),
                0 0 120px rgba(255,200,100,0.05),
                0 0 1px rgba(255,255,255,0.15),
                inset 0 1px 0 rgba(255,255,255,0.1);
        }
        
        .main-card:active {
            transform: perspective(1000px) scale(0.98);
        }
        
        /* Animated border gradient */
        .main-card::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            background: linear-gradient(135deg, 
                rgba(255,200,100,0.3) 0%, 
                rgba(0,212,255,0.2) 25%,
                rgba(92,219,149,0.2) 50%,
                rgba(167,139,250,0.2) 75%,
                rgba(255,200,100,0.3) 100%);
            background-size: 400% 400%;
            border-radius: 28px;
            z-index: -1;
            animation: borderGradient 8s ease infinite;
            opacity: 0.5;
        }
        
        @keyframes borderGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        /* Avatar section with 3D effect */
        .avatar-section {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
        }
        
        .avatar-ring {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, 
                var(--primary), var(--accent), var(--success), var(--primary));
            animation: ringRotate 10s linear infinite;
            opacity: 0.6;
        }
        
        @keyframes ringRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .avatar-inner {
            position: absolute;
            top: 6px; left: 6px;
            right: 6px; bottom: 6px;
            background: var(--bg-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .avatar-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            animation: glowPulse 3s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.3; }
        }
        
        .avatar {
            font-size: 56px;
            position: relative;
            z-index: 1;
            animation: avatarBounce 3s ease-in-out infinite;
            filter: drop-shadow(0 0 25px var(--primary-glow));
            transition: transform 0.3s;
            cursor: default;
            user-select: none;
        }
        
        .main-card:hover .avatar {
            transform: scale(1.1);
        }
        
        @keyframes avatarBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-6px) scale(1.02); }
        }
        
        /* Dynamic emoji states */
        .avatar.working {
            animation: avatarWorking 1s ease-in-out infinite;
        }
        
        @keyframes avatarWorking {
            0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
            25% { transform: translateY(-3px) scale(1.05) rotate(-5deg); }
            75% { transform: translateY(-3px) scale(1.05) rotate(5deg); }
        }
        
        .avatar.excited {
            animation: avatarExcited 0.5s ease-in-out infinite;
        }
        
        @keyframes avatarExcited {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        /* Click ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,200,100,0.4);
            transform: scale(0);
            animation: rippleAnim 0.6s linear;
            pointer-events: none;
        }
        
        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
        
        .name {
            font-size: 26px;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin-bottom: 6px;
            text-shadow: 0 0 30px var(--primary-glow);
            letter-spacing: 1px;
        }
        
        /* Status indicator with advanced animation */
        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
            padding: 10px 20px;
            background: var(--glass);
            border-radius: 30px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 
                0 0 10px var(--success-glow),
                0 0 20px var(--success-glow),
                0 0 30px var(--success-glow);
            position: relative;
            animation: statusPulse 2s ease-in-out infinite;
        }
        
        .status-dot::after {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            border: 2px solid var(--success);
            opacity: 0;
            animation: statusRipple 2s ease-out infinite;
        }
        
        @keyframes statusRipple {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        @keyframes statusPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.8; }
        }
        
        .status-dot.idle {
            background: var(--warning);
            box-shadow: 0 0 10px var(--warning-glow), 0 0 20px var(--warning-glow);
        }
        
        .status-dot.idle::after { border-color: var(--warning); }
        
        .status-dot.working {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow), 0 0 20px var(--accent-glow);
        }
        
        .status-dot.working::after { border-color: var(--accent); }
        
        .status {
            font-size: 13px;
            font-weight: 600;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .status.idle { color: var(--warning); }
        .status.working { color: var(--accent); }
        
        /* Stats grid with hover effects */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .stat-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px 10px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.5s;
        }
        
        .stat-card:hover::before {
            left: 100%;
        }
        
        .stat-card:hover {
            background: rgba(255,255,255,0.06);
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(255,255,255,0.15);
        }
        
        .stat-card:active {
            transform: scale(0.95);
        }
        
        .stat-card .stat-icon {
            font-size: 18px;
            margin-bottom: 6px;
            display: block;
            transition: transform 0.3s;
        }
        
        .stat-card:hover .stat-icon {
            transform: scale(1.2);
        }
        
        .stat-label {
            font-size: 9px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            transition: all 0.3s;
        }
        
        .stat-card.heartbeat .stat-value { 
            color: var(--danger); 
            text-shadow: 0 0 15px var(--danger-glow);
        }
        .stat-card.messages .stat-value { 
            color: var(--accent); 
            text-shadow: 0 0 15px var(--accent-glow);
        }
        .stat-card.tasks .stat-value { 
            color: var(--success); 
            text-shadow: 0 0 15px var(--success-glow);
        }
        .stat-card.uptime .stat-value { 
            color: var(--primary); 
            text-shadow: 0 0 15px var(--primary-glow);
        }
        .stat-card.skills .stat-value { 
            color: #a78bfa; 
            text-shadow: 0 0 15px rgba(167,139,250,0.3);
        }
        .stat-card.health .stat-value { 
            color: var(--success); 
            text-shadow: 0 0 15px var(--success-glow);
        }
        
        /* Animated value change */
        .stat-value.updating {
            animation: valueUpdate 0.5s ease;
        }
        
        @keyframes valueUpdate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        
        /* Current task display */
        .current-task {
            margin-top: 20px;
            padding: 16px;
            background: linear-gradient(135deg, 
                rgba(0,212,255,0.08) 0%, 
                rgba(92,219,149,0.05) 100%);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 14px;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
            display: none;
        }
        
        .current-task.visible {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }
        
        .current-task-label {
            font-size: 9px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .current-task-label::before,
        .current-task-label::after {
            content: '';
            width: 20px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent));
        }
        
        .current-task-label::after {
            background: linear-gradient(90deg, var(--accent), transparent);
        }
        
        .current-task-text {
            font-size: 12px;
            color: #ccc;
            line-height: 1.6;
            max-height: 40px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Animated loading bar */
        .loading-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
            position: relative;
        }
        
        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, 
                var(--accent) 0%, 
                var(--success) 50%, 
                var(--accent) 100%);
            background-size: 200% 100%;
            border-radius: 2px;
            animation: loading 2s linear infinite;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Sparkle effect */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle 1s ease-out forwards;
        }
        
        @keyframes sparkle {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }
        
        /* Time display */
        .time-display {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        
        /* Subtle scan line effect */
        .scanlines {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 100;
            opacity: 0.3;
        }
        
        /* Easter egg hint */
        .hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: var(--text-dim);
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 50;
        }
        
        .hint.show {
            opacity: 0.5;
        }
        
        /* Message popup */
        .message-popup {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 20px;
            color: var(--text);
            font-size: 13px;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 200;
            backdrop-filter: blur(10px);
        }
        
        .message-popup.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        
        /* Quick stats panel */
        .quick-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--glass-border);
        }
        
        .quick-stat {
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .quick-stat:hover {
            transform: scale(1.1);
        }
        
        .quick-stat-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        
        .quick-stat-label {
            font-size: 8px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="particles" id="particles"></div>
    <div class="scanlines"></div>
    <div class="message-popup" id="messagePopup"></div>
    <div class="hint" id="hint">Click the card for a surprise!</div>
    
    <div class="main-card" id="mainCard">
        <div class="time-display" id="timeDisplay"></div>
        
        <div class="avatar-section">
            <div class="avatar-ring"></div>
            <div class="avatar-inner">
                <div class="avatar-glow"></div>
                <div class="avatar" id="avatar">⚡</div>
            </div>
        </div>
        
        <div class="name">MoShang</div>
        
        <div class="status-container">
            <div class="status-dot" id="statusDot"></div>
            <div class="status" id="status">Online</div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card heartbeat">
                <span class="stat-icon">💓</span>
                <div class="stat-label">Heartbeat</div>
                <div class="stat-value" id="hb">--</div>
            </div>
            <div class="stat-card messages">
                <span class="stat-icon">💬</span>
                <div class="stat-label">Messages</div>
                <div class="stat-value" id="msgs">0</div>
            </div>
            <div class="stat-card tasks">
                <span class="stat-icon">✅</span>
                <div class="stat-label">Tasks</div>
                <div class="stat-value" id="tasks">0</div>
            </div>
            <div class="stat-card uptime">
                <span class="stat-icon">⏱️</span>
                <div class="stat-label">Uptime</div>
                <div class="stat-value" id="uptime">0h</div>
            </div>
            <div class="stat-card skills">
                <span class="stat-icon">🧩</span>
                <div class="stat-label">Skills</div>
                <div class="stat-value" id="skills">6</div>
            </div>
            <div class="stat-card health">
                <span class="stat-icon">💊</span>
                <div class="stat-label">Health</div>
                <div class="stat-value" id="health">OK</div>
            </div>
        </div>
        
        <div class="current-task" id="taskBox">
            <div class="current-task-label">Current Task</div>
            <div class="current-task-text" id="currentTask"></div>
            <div class="loading-bar">
                <div class="loading-bar-fill"></div>
            </div>
        </div>
        
        <div class="quick-stats">
            <div class="quick-stat" id="quickMem">
                <div class="quick-stat-value" id="mem">--</div>
                <div class="quick-stat-label">Memory</div>
            </div>
            <div class="quick-stat" id="quickCpu">
                <div class="quick-stat-value" id="cpu">--</div>
                <div class="quick-stat-label">CPU</div>
            </div>
        </div>
    </div>

    <script>
        // Generate floating particles with multiple colors
        const particlesContainer = document.getElementById('particles');
        const colors = ['#ffc864', '#00d4ff', '#5cdb95', '#a78bfa', '#ff6b6b'];
        for (let i = 0; i < 25; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            particle.style.animationDelay = Math.random() * 18 + 's';
            particle.style.animationDuration = (12 + Math.random() * 12) + 's';
            particle.style.opacity = 0.1 + Math.random() * 0.4;
            particlesContainer.appendChild(particle);
        }
        
        // Update time display
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { 
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            document.getElementById('timeDisplay').textContent = timeStr;
        }
        updateTime();
        setInterval(updateTime, 1000);
        
        // Animate value change
        function animateValue(element, newValue) {
            if (element.textContent !== String(newValue)) {
                element.classList.add('updating');
                setTimeout(() => element.classList.remove('updating'), 500);
            }
            element.textContent = newValue;
        }
        
        // Create sparkle effect
        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            sparkle.style.background = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 1000);
        }
        
        // Show message popup
        function showMessage(text, duration = 3000) {
            const popup = document.getElementById('messagePopup');
            popup.textContent = text;
            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), duration);
        }
        
        // Easter egg - card click
        let clickCount = 0;
        const mainCard = document.getElementById('mainCard');
        const avatar = document.getElementById('avatar');
        
        mainCard.addEventListener('click', function(e) {
            // Create ripple effect
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            const rect = this.getBoundingClientRect();
            ripple.style.left = (e.clientX - rect.left) + 'px';
            ripple.style.top = (e.clientY - rect.top) + 'px';
            this.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
            
            // Click responses
            clickCount++;
            const responses = [
                () => { avatar.textContent = '⚡'; showMessage('闪电⚡准备好啦！'); },
                () => { avatar.textContent = '✨'; showMessage('一闪一闪亮晶晶～'); },
                () => { avatar.textContent = '🔥'; showMessage('充满能量！'); },
                () => { avatar.textContent = '🎯'; showMessage('瞄准目标！'); },
                () => { avatar.textContent = '💫'; showMessage('旋转跳跃！'); },
                () => { 
                    avatar.textContent = '😄'; 
                    showMessage('你好呀哥哥！');
                    // Create multiple sparkles
                    for (let i = 0; i < 5; i++) {
                        setTimeout(() => {
                            createSparkle(
                                rect.left + Math.random() * rect.width,
                                rect.top + Math.random() * rect.height
                            );
                        }, i * 100);
                    }
                }
            ];
            
            if (clickCount <= responses.length) {
                responses[clickCount - 1]();
                avatar.classList.add('excited');
                setTimeout(() => {
                    avatar.classList.remove('excited');
                    avatar.textContent = '⚡';
                }, 2000);
            } else {
                clickCount = 0;
                responses[0]();
            }
            
            // Show hint after a few seconds
            setTimeout(() => {
                document.getElementById('hint').classList.add('show');
            }, 3000);
        });
        
        // Dynamic avatar based on status
        const statusEmojis = {
            working: '⚡',
            idle: '💤',
            online: '⚡'
        };
        
        // Update dashboard data
        let lastTask = '';
        function update() {
            fetch('/api/dashboard').then(r=>r.json()).then(d=>{
                // Update stats with animation
                animateValue(document.getElementById('hb'), d.heartbeat || '--');
                animateValue(document.getElementById('msgs'), d.msgCount || '0');
                animateValue(document.getElementById('tasks'), d.taskDone || '0');
                animateValue(document.getElementById('uptime'), d.uptime || '0h');
                
                // Update quick stats
                if (d.memory) animateValue(document.getElementById('mem'), d.memory);
                if (d.cpu) animateValue(document.getElementById('cpu'), d.cpu);
                
                // Update status
                const task = d.currentTask || '';
                const statusEl = document.getElementById('status');
                const statusDot = document.getElementById('statusDot');
                const taskBox = document.getElementById('taskBox');
                
                if (task) {
                    statusEl.textContent = 'Working';
                    statusEl.className = 'status working';
                    statusDot.className = 'status-dot working';
                    avatar.textContent = '⚡';
                    avatar.classList.add('working');
                    avatar.classList.remove('excited');
                    
                    // Only show task box when task changes
                    if (task !== lastTask) {
                        taskBox.classList.add('visible');
                        // Create sparkle effect on task change
                        const rect = taskBox.getBoundingClientRect();
                        createSparkle(rect.left + Math.random() * rect.width, rect.top);
                        lastTask = task;
                    }
                    document.getElementById('currentTask').textContent = task;
                } else {
                    statusEl.textContent = 'Idle';
                    statusEl.className = 'status idle';
                    statusDot.className = 'status-dot idle';
                    taskBox.classList.remove('visible');
                    avatar.textContent = '💤';
                    avatar.classList.remove('working');
                    avatar.classList.remove('excited');
                    lastTask = '';
                }
                
                // Health check
                if (d.uptime && d.uptime !== '0h') {
                    animateValue(document.getElementById('health'), 'OK');
                }
            }).catch(()=>{
                animateValue(document.getElementById('health'), 'ERR');
            });
            setTimeout(update, 3000);
        }
        update();
    </script>
</body>
</html>
