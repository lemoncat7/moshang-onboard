<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoShang Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            color: #fff;
        }
        
        /* 左侧大屏 */
        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }
        
        .bg-effect {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255,149,0,0.15) 0%, transparent 60%);
            transition: all 1s ease;
        }
        
        .bg-effect.working { background: radial-gradient(circle at 50% 50%, rgba(255,149,0,0.2) 0%, transparent 60%); }
        .bg-effect.idle { background: radial-gradient(circle at 50% 50%, rgba(52,199,89,0.15) 0%, transparent 60%); }
        .bg-effect.learning { background: radial-gradient(circle at 50% 50%, rgba(0,122,255,0.2) 0%, transparent 60%); }
        .bg-effect.chatting { background: radial-gradient(circle at 50% 50%, rgba(88,86,214,0.2) 0%, transparent 60%); }
        
        .center-icon {
            font-size: 120px;
            z-index: 1;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .center-icon.working { animation: workPulse 1.5s ease-in-out infinite; }
        @keyframes workPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.2); }
        }
        
        .status-text {
            font-size: 32px;
            font-weight: 300;
            margin-top: 20px;
            z-index: 1;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        
        .status-sub {
            font-size: 14px;
            color: rgba(255,255,255,0.4);
            margin-top: 8px;
            z-index: 1;
        }
        
        /* 右侧状态栏 */
        .sidebar {
            width: 280px;
            background: rgba(30,30,30,0.8);
            backdrop-filter: blur(20px);
            padding: 24px;
            border-left: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .sidebar-title {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stat-label {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        
        .stat-value {
            font-size: 15px;
            font-weight: 600;
        }
        
        .stat-value.orange { color: #ff9500; }
        .stat-value.green { color: #34c759; }
        .stat-value.blue { color: #007aff; }
        .stat-value.purple { color: #af52de; }
        
        .heartbeat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 16px;
            margin-top: auto;
        }
        
        .heartbeat-title {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .heartbeat-value {
            font-size: 24px;
            font-weight: 600;
            color: #ff3b30;
        }
        
        .heartbeat-canvas {
            width: 100%;
            height: 60px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        
        .task-list {
            flex: 1;
            overflow-y: auto;
            max-height: 150px;
        }
        
        .task-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
        }
        
        .task-item-title {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .task-item-time {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }
        
        .bottom-time {
            text-align: center;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .time-big {
            font-size: 36px;
            font-weight: 200;
        }
        
        .time-date {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-top: 4px;
        }
        
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; border-left: none; border-top: 1px solid rgba(255,255,255,0.1); }
            .center-icon { font-size: 80px; }
            .status-text { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="main-stage">
        <div class="bg-effect" id="bgEffect"></div>
        <div class="center-icon" id="CenterIcon">⚡</div>
        <div class="status-text" id="statusText">READY</div>
        <div class="status-sub" id="statusSub">等待任务中...</div>
    </div>
    
    <div class="sidebar">
        <div class="sidebar-title">System</div>
        
        <div class="stat-row">
            <span class="stat-label">Heartbeat</span>
            <span class="stat-value orange" id="hb">--:--</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Uptime</span>
            <span class="stat-value" id="uptime">0h</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Messages</span>
            <span class="stat-value blue" id="msgs">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Tasks Done</span>
            <span class="stat-value green" id="tasks">0</span>
        </div>
        
        <div class="sidebar-title" style="margin-top: 16px;">EvoMap</div>
        
        <div class="stat-row">
            <span class="stat-label">Reputation</span>
            <span class="stat-value orange" id="evoRep">--</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Published</span>
            <span class="stat-value" id="evoPub">--</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Promoted</span>
            <span class="stat-value green" id="evoPro">--</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Status</span>
            <span class="stat-value" id="evoStatus">--</span>
        </div>
        
        <div class="sidebar-title" style="margin-top: 16px;">Activity</div>
        <div class="task-list" id="taskList">
            <div class="task-item">
                <div class="task-item-title">等待任务...</div>
                <div class="task-item-time">--</div>
            </div>
        </div>
        
        <div class="heartbeat-card">
            <div class="heartbeat-title">
                <span>Heart Rate</span>
                <span class="heartbeat-value" id="hrValue">72</span>
            </div>
            <canvas class="heartbeat-canvas" id="hrCanvas"></canvas>
        </div>
        
        <div class="bottom-time">
            <div class="time-big" id="clock">--:--</div>
            <div class="time-date" id="date">--</div>
        </div>
    </div>

    <script>
        // ============ 心率配置参数 ============
        const HR_CONFIG = {
            speed: 0.5,          // 波形移动速度 (0.1-2)
            baseRate: 70,        // 基础心率
            variance: 5,          // 心率随机波动范围
            waveAmplitude: 1.0,  // 波形幅度 (0.5-1.5)
            noise: 0.3           // 噪声强度 (0-1)
        };
        
        // 根据活跃度调整参数
        function updateHRConfig(activityLevel) {
            // activityLevel: 0-100 (0=完全休息, 100=极度活跃)
            HR_CONFIG.speed = 0.3 + (activityLevel / 100) * 1.2;
            HR_CONFIG.baseRate = 55 + (activityLevel / 100) * 50;
            HR_CONFIG.waveAmplitude = 0.7 + (activityLevel / 100) * 0.6;
            HR_CONFIG.noise = 0.1 + (activityLevel / 100) * 0.4;
        }
        
        // ============ 心率图 ============
        const canvas = document.getElementById('hrCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        let phase = 0;
        let currentHR = 70;
        let targetHR = 70;
        
        // 噪声数组
        const noiseBuffer = [];
        for (let i = 0; i < 100; i++) {
            noiseBuffer.push((Math.random() - 0.5) * 2);
        }
        
        function drawECG() {
            const w = canvas.width;
            const h = canvas.height;
            const mid = h / 2;
            const amp = HR_CONFIG.waveAmplitude;
            
            // 渐变清除
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fillRect(0, 0, w, h);
            
            // 画网格
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            for (let y = 0; y < h; y += 10) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }
            
            // 画波形
            ctx.strokeStyle = '#ff3b30';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            for (let x = 0; x < w; x++) {
                let y = mid;
                const p = (x + phase) % 200;
                
                // 噪声
                const noise = noiseBuffer[Math.floor(p) % noiseBuffer.length] * HR_CONFIG.noise * 10;
                
                // 心电图波形 (更自然的 R-R 间隔)
                if (p < 15) {
                    y = mid - Math.sin(p * 0.35) * 8 * amp + noise;
                } else if (p < 22) {
                    y = mid - (p - 15) * 5 * amp + noise;
                } else if (p < 30) {
                    y = mid - (30 - p) * 5 * amp + noise;
                } else if (p < 40) {
                    y = mid + Math.sin((p - 30) * 0.4) * 12 * amp + noise;
                } else if (p < 60) {
                    y = mid + Math.sin((p - 40) * 0.15) * 3 * amp + noise;
                } else if (p < 80) {
                    y = mid + Math.sin((p - 60) * 0.2) * 2 * amp + noise;
                } else {
                    y = mid + noise * 0.5;
                }
                
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            
            // 移动速度
            phase = (phase + HR_CONFIG.speed) % 200;
            
            // 平滑心率变化
            currentHR += (targetHR - currentHR) * 0.05;
            document.getElementById('hrValue').textContent = Math.round(currentHR);
            
            requestAnimationFrame(drawECG);
        }
        drawECG();
        
        // ============ 状态管理 ============
        const states = {
            idle: { icon: '😴', text: 'IDLE', sub: '休息中...', class: 'idle', activity: 10 },
            working: { icon: '⚡', text: 'WORKING', sub: '处理任务中...', class: 'working', activity: 80 },
            learning: { icon: '📚', text: 'LEARNING', sub: '学习新技能...', class: 'learning', activity: 60 },
            chatting: { icon: '💬', text: 'CHATTING', sub: '和哥哥聊天中...', class: 'chatting', activity: 50 },
            thinking: { icon: '🤔', text: 'THINKING', sub: '思考中...', class: 'learning', activity: 40 }
        };
        
        let currentState = 'idle';
        
        function setState(state) {
            currentState = state;
            const s = states[state] || states.idle;
            
            document.getElementById('CenterIcon').textContent = s.icon;
            document.getElementById('CenterIcon').className = 'center-icon ' + s.class;
            document.getElementById('statusText').textContent = s.text;
            document.getElementById('statusSub').textContent = s.sub;
            document.getElementById('bgEffect').className = 'bg-effect ' + s.class;
            
            // 根据状态调整心率参数
            updateHRConfig(s.activity);
            
            // 目标心率 = 基础 + 状态偏移 + 随机波动
            targetHR = HR_CONFIG.baseRate + (Math.random() - 0.5) * HR_CONFIG.variance * 2;
        }
        
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}`;
            
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            document.getElementById('date').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
        }
        
        function update() {
            fetch('/api/dashboard').then(r=>r.json()).then(d=>{
                document.getElementById('hb').textContent = d.heartbeat || '--:--';
                document.getElementById('msgs').textContent = d.msgCount || '0';
                document.getElementById('tasks').textContent = d.taskDone || '0';
                document.getElementById('uptime').textContent = d.uptime || '0h';
                
                if (d.currentTask) {
                    if (d.currentTask.includes('learn') || d.currentTask.includes('study')) {
                        setState('learning');
                    } else {
                        setState('working');
                    }
                } else {
                    setState('idle');
                }
                
                if (d.evomap) {
                    const e = d.evomap;
                    document.getElementById('evoRep').textContent = e.reputation || '--';
                    document.getElementById('evoPub').textContent = e.published || '0';
                    document.getElementById('evoPro').textContent = e.promoted || '0';
                    document.getElementById('evoStatus').textContent = e.survival || '--';
                }
            }).catch(()=>{});
            
            updateTime();
            setTimeout(update, 3000);
        }
        
        update();
    </script>
</body>
</html>
